<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contactez Luxus Chamba pour vos besoins en voitures de luxe.">
    <title>Contact - Luxus Chamba</title>
    <link rel="stylesheet" href="stylecontact.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="../home/Home.html" class="logo-link">
                <img src="/photo/ChatGPT Image 6 nov. 2025, 08_51_43.png" alt="Logo Luxus Chamba" class="logo-img">
                <span class="logo-text">Luxus Chamba</span>
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="../home/Home.html">Accueil</a></li>
                <li><a href="../voiture/voiture.html">Voitures</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <header class="card-header">
                <h3>Contactez-nous</h3>
            </header>
            <div class="card-body">
                <form role="form">
                    <label for="name">Nom</label>
                    <input class="form-control" id="name" name="name" required type="text" aria-label="Votre nom">
                    <label for="email">Email</label>
                    <input class="form-control" id="email" name="email" required type="email" aria-label="Votre email">
                    <label for="message">Message</label>
                    <textarea class="form-control" id="message" name="message" required aria-label="Votre message"></textarea>
                    <button class="btn" type="submit">Envoyer</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Luxus Chamba. Tous droits réservés.</p>
        <a href="/video/video.html" class="contact-btn">Secret video</a>
    </footer>
</body>
</html>
